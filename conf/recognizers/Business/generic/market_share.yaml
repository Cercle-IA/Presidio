# Recognizer pour parts de marché
recognizer_registry:
  recognizers:
    - name: MarketShareRecognizer
      supported_language: fr
      supported_entity: MARKET_SHARE
      patterns:
        # Pourcentage suivi d'une référence au marché (ex: "50% de part de marché")
        # Lookahead : ne capture que le chiffre%, le contexte reste dans le texte final
        - name: Percentage Before Market Reference
          regex: "\\b\\d{1,3}(?:[.,]\\d{1,2})?%(?=\\s*(?:de\\s+(?:part(?:s)?\\s+de\\s+)?marché|du\\s+marché|de\\s+parts?|de\\s+market\\s+share))"
          score: 0.95

        # Pourcentage de chiffre d'affaires du marché (ex: "50% du CA du secteur")
        - name: Revenue Market Share
          regex: "\\b\\d{1,3}(?:[.,]\\d{1,2})?%(?=\\s*(?:du\\s+)?(?:chiffre\\s+d.affaires|CA|revenus?)\\s+(?:du\\s+)?(?:marché|secteur))"
          score: 0.85

        # Positions de marché textuelles (ex: "leader du marché")
        - name: Market Position
          regex: "\\b(?:leader|numéro\\s+\\d+|\\d+(?:er|ème)\\s+acteur|position\\s+dominante|monopole)\\s+(?:du\\s+)?(?:marché|secteur)\\b"
          score: 0.85

        # Parts relatives textuelles (ex: "position majoritaire sur le marché")
        - name: Relative Market Share
          regex: "\\b(?:majoritaire|minoritaire|principale|significative)\\s+(?:part\\s+de\\s+)?marché\\b"
          score: 0.8

        # Pourcentage simple (score bas < threshold 0.35, requiert boost contextuel +0.35)
        # Se déclenche quand "part de marché", "détient", "contrôle", etc. sont proches
        - name: Simple Percentage In Market Context
          regex: "\\b\\d{1,3}(?:[.,]\\d{1,2})?%"
          score: 0.3

      context:
        [
          "part de marché",
          "parts de marché",
          "market share",
          "position concurrentielle",
          "leader",
          "concurrent",
          "secteur",
          "industrie",
          "concentration",
          "monopole",
          "oligopole",
          "quota",
          "chiffre d'affaires",
          "revenus",
          "détient",
          "possède",
          "contrôle",
          "représente",
          "atteint",
        ]
