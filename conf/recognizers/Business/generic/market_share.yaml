# Recognizer pour parts de marché
recognizer_registry:
  recognizers:
    - name: MarketShareRecognizer
      supported_language: fr
      supported_entity: MARKET_SHARE
      patterns:
        # Pourcentage suivi d'une référence au marché (ex: "50% de part de marché", "38% du marché", "27% sur le marché")
        # Lookahead : ne capture que le chiffre%, le contexte reste dans le texte final
        - name: Percentage With Market Reference
          regex: "\\b\\d{1,3}(?:[.,]\\d{1,2})?%(?=\\s*(?:de\\s+(?:part(?:s)?\\s+de\\s+)?marché|du\\s+marché|sur\\s+(?:le\\s+)?marché|de\\s+parts?|de\\s+market\\s+share|du\\s+secteur))"
          score: 0.95

        # Pourcentage de chiffre d'affaires du marché (ex: "50% du CA du secteur")
        - name: Revenue Market Share
          regex: "\\b\\d{1,3}(?:[.,]\\d{1,2})?%(?=\\s*(?:du\\s+)?(?:chiffre\\s+d.affaires|CA|revenus?)\\s+(?:du\\s+)?(?:marché|secteur))"
          score: 0.85

        # Pourcentage simple — score bas, requiert boost contextuel via phrases composées spécifiques
        # Ex: "notre PDM est de 23%" ou "les 39% restants" dans un paragraphe qui mentionne "du marché"
        - name: Simple Percentage With Specific Market Context
          regex: "\\b\\d{1,3}(?:[.,]\\d{1,2})?%"
          score: 0.3

      context:
        [
          "part de marché",
          "parts de marché",
          "market share",
          "du marché",
          "de marché",
          "position concurrentielle",
          "monopole",
          "oligopole",
        ]
