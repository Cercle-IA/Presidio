# Recognizer pour formes juridiques françaises
recognizer_registry:
  recognizers:
    - name: FrenchCompanyFormsRecognizer
      supported_language: fr
      supported_entity: SOCIETE_FRANCAISE
      patterns:
        - name: SARL avec nom
          regex: "\\b(?:SARL|Sarl)\\s+(?-i:[A-ZÀ-Ÿ])[a-zà-ÿ\\s&'-]+\\b"
          score: 0.95
        - name: SAS avec nom
          regex: "\\b(?:SAS|Sas)\\s+(?-i:[A-ZÀ-Ÿ])[a-zà-ÿ\\s&'-]+\\b"
          score: 0.95
        - name: SA avec nom
          regex: "\\b(?:SA|Sa)\\s+(?-i:[A-ZÀ-Ÿ])[a-zà-ÿ\\s&'-]+\\b"
          score: 0.9
        - name: EURL avec nom
          regex: "\\b(?:EURL|Eurl)\\s+(?-i:[A-ZÀ-Ÿ])[a-zà-ÿ\\s&'-]+\\b"
          score: 0.95
        - name: SCI avec nom
          regex: "\\b(?:SCI|Sci)\\s+(?-i:[A-ZÀ-Ÿ])[a-zà-ÿ\\s&'-]+\\b"
          score: 0.9
      context: ["société", "entreprise", "forme juridique", "statut", "commercial"]