# Recognizer pour numéros IBAN
recognizer_registry:
  recognizers:
    - name: IBANRecognizer
      supported_language: fr
      supported_entity: IBAN
      patterns:
        - name: IBAN français
          regex: "\\bFR[0-9]{2}\\s?[0-9]{4}\\s?[0-9]{4}\\s?[0-9]{4}\\s?[0-9]{4}\\s?[0-9]{4}\\s?[0-9]{3}\\b"
          score: 1.0
        - name: IBAN belge
          regex: "\\bBE[0-9]{2}\\s?[0-9]{4}\\s?[0-9]{4}\\s?[0-9]{4}\\b"
          score: 1.0
        - name: IBAN générique européen
          # Presidio compile les regex avec re.IGNORECASE par défaut : sans le
          # groupe (?-i:...), [A-Z0-9] matche aussi les minuscules environnantes
          # et le pattern avale des mots du texte qui suivent l'IBAN.
          regex: "\\b(?-i:[A-Z]{2})[0-9]{2}\\s?(?:(?-i:[A-Z0-9]){4}\\s?){2,7}(?-i:[A-Z0-9]){1,4}\\b"
          score: 0.9
        - name: IBAN compact
          regex: "\\b(?-i:[A-Z]{2})[0-9]{2}(?-i:[A-Z0-9]){12,30}\\b"
          score: 0.85
        - name: IBAN avec contexte
          regex: "\\b(?:IBAN|iban)\\s*:?\\s*((?-i:[A-Z]{2})[0-9]{2}\\s?(?:(?-i:[A-Z0-9]){4}\\s?){2,7}(?-i:[A-Z0-9]){1,4})\\b"
          score: 0.95
      context:
        [
          "IBAN",
          "iban",
          "compte",
          "bancaire",
          "virement",
          "RIB",
          "coordonnées bancaires",
        ]
